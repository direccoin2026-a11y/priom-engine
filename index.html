<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧠 PRIOM V0.1</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;background:#0a0a0f;font-family:'Segoe UI',sans-serif;color:#fff}
        canvas{display:block;width:100vw;height:100vh}
        #hud{position:fixed;top:15px;left:15px;background:rgba(0,0,0,0.85);padding:12px 18px;border-radius:12px;border:1px solid rgba(124,58,237,0.3);z-index:100;pointer-events:none}
        #hud .logo{font-size:18px;font-weight:900;background:linear-gradient(135deg,#7c3aed,#06b6d4,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        #hud .subtitle{font-size:9px;color:#6b7280;margin-top:2px}
        #stats{position:fixed;top:15px;right:15px;background:rgba(0,0,0,0.85);padding:10px 14px;border-radius:12px;z-index:100;pointer-events:none;font-size:10px;min-width:120px}
        #stats .stat{display:flex;justify-content:space-between;padding:2px 0;color:#9ca3af;border-bottom:1px solid rgba(255,255,255,0.05)}
        #stats .stat:last-child{border-bottom:none}
        #stats .stat .v{color:#fff;font-weight:600}
        #stats .stat .v.good{color:#10b981}
        #controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:4px;flex-wrap:wrap;justify-content:center;background:rgba(0,0,0,0.8);padding:8px 12px;border-radius:14px}
        #controls button{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.08);color:#d1d5db;padding:4px 12px;border-radius:8px;font-size:9px;cursor:pointer;transition:all 0.3s;font-family:inherit}
        #controls button:hover{background:rgba(255,255,255,0.15)}
        #controls button.green{background:#10b981;border-color:#10b981;color:#fff;font-weight:700}
        #loading{position:fixed;inset:0;background:#0a0a0f;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;transition:opacity 0.8s}
        #loading.hidden{opacity:0;pointer-events:none}
        .loader-icon{font-size:64px;animation:pulse 1.5s ease-in-out infinite}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
        .loader-title{font-size:28px;font-weight:900;background:linear-gradient(135deg,#7c3aed,#06b6d4,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .loader-text{color:#6b7280;font-size:14px;margin-top:12px}
        #notif{position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:200;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:4px}
        .notif{background:rgba(0,0,0,0.9);border:1px solid rgba(124,58,237,0.2);border-radius:8px;padding:6px 16px;font-size:11px;color:#fff;animation:slideDown 0.3s ease, fadeOut 0.3s 3s ease forwards}
        @keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeOut{to{opacity:0;transform:translateY(-10px)}}
        #geo-lab{position:fixed;top:80px;right:15px;width:200px;background:rgba(0,0,0,0.85);padding:10px 12px;border-radius:12px;border:1px solid rgba(16,185,129,0.3);z-index:100;font-size:10px}
        #geo-lab .geo-title{font-size:12px;font-weight:900;background:linear-gradient(135deg,#10b981,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        #geo-lab select{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#fff;padding:4px 6px;border-radius:6px;font-size:10px;margin:4px 0;font-family:inherit}
        #geo-lab .geo-btn{width:100%;background:linear-gradient(135deg,#10b981,#059669);border:none;color:#fff;font-weight:700;padding:4px;border-radius:6px;cursor:pointer;font-size:10px}
        #geo-lab .geo-stats{display:flex;justify-content:space-between;margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,0.05);font-size:9px;color:#6b7280}
        #geo-lab .geo-stats b{color:#10b981}
        #ai-status{position:fixed;bottom:75px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);padding:6px 16px;border-radius:20px;z-index:100;font-size:9px;display:flex;align-items:center;gap:12px;border:1px solid rgba(124,58,237,0.15)}
        #ai-status .ai-icon{font-size:14px}
        #ai-status .ai-text{color:#d1d5db}
        #ai-status .ai-text strong{color:#8b5cf6}
        #ai-status .ai-bar{width:60px;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
        #ai-status .ai-bar .fill{height:100%;background:linear-gradient(90deg,#7c3aed,#06b6d4,#10b981);border-radius:2px;transition:width 0.3s}
        #ai-status .ai-stats{color:#6b7280;display:flex;gap:8px}
        #ai-status .ai-stats .highlight{color:#8b5cf6}
    </style>
</head>
<body>

    <!-- LOADING -->
    <div id="loading">
        <div class="loader-icon">🧠</div>
        <div class="loader-title">PRIOM</div>
        <div class="loader-text" id="loader-text">Cargando motor...</div>
    </div>

    <!-- HUD -->
    <div id="hud">
        <div class="logo">🧠 PRIOM V0.1</div>
        <div class="subtitle">IA Dual · Renderizado Adaptativo</div>
    </div>

    <!-- STATS -->
    <div id="stats">
        <div class="stat">FPS <span class="v good" id="fps">0</span></div>
        <div class="stat">Entidades <span class="v" id="entities">0</span></div>
        <div class="stat">Calidad <span class="v" id="quality">MAX</span></div>
    </div>

    <!-- AI STATUS -->
    <div id="ai-status">
        <span class="ai-icon">🧠</span>
        <span class="ai-text"><strong id="ai-action">IA DUAL</strong> <span id="ai-detail">· Iniciando</span></span>
        <div class="ai-bar"><div class="fill" id="ai-bar-fill" style="width:100%"></div></div>
        <div class="ai-stats"><span>🎯 <span class="highlight" id="ai-conf">100%</span></span></div>
    </div>

    <!-- CONTROLES -->
    <div id="controls">
        <button class="green" id="btn-spawn">➕ Spawn</button>
        <button id="btn-reset">🔄 Reset</button>
        <button id="btn-low">Low</button>
        <button id="btn-ultra">Ultra</button>
    </div>

    <!-- NOTIFICACIONES -->
    <div id="notif"></div>

    <!-- GEO LAB -->
    <div id="geo-lab">
        <div class="geo-title">🔷 Laboratorio</div>
        <select id="geo-family">
            <option value="supershape">Supershape 3D</option>
            <option value="torusknot">Nudo tórico</option>
        </select>
        <button class="geo-btn" id="geo-generate">✨ Generar</button>
        <div class="geo-stats">
            <span>Vértices <b id="geo-verts">0</b></span>
            <span>Triángulos <b id="geo-tris">0</b></span>
        </div>
    </div>

    <!-- CANVAS -->
    <canvas id="gameCanvas"></canvas>

    <!-- ============================================================
         SCRIPTS - CARGA DIRECTA SIN SISTEMA DE MÓDULOS
         ============================================================ -->
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
    // ============================================================
    //  CONFIG - Definido directamente
    //  ============================================================
    const CONFIG = {
        version: '0.1.0',
        build: '2025.01.01',
        maxEntities: 50000,
        targetFPS: 60,
        quality: 'ultra',
        lodDistance: 200,
        waterEnabled: true,
        particlesEnabled: true,
        shadowsEnabled: true,
        bloomEnabled: true,
        ssaoEnabled: true,
        debug: false,
        worldSize: 1000,
        terrainHeight: 30,
        treeDensity: 0.3,
        animalCount: 100,
        gravity: -9.8,
        windStrength: 0.6
    };
    console.log('✅ Config cargado');
    </script>
    
    <script src="js/core/config.js"></script>
    <script src="js/core/hardwaredetector.js"></script>
    <script src="js/core/persistentmemory.js"></script>
    <script src="js/ecs/soamanager.js"></script>
    <script src="js/ai/optimizerai.js"></script>
    <script src="js/ai/metaoptimizerai.js"></script>
    <script src="js/renderer/maxrenderer.js"></script>
    <script src="js/renderer/complexgeometrylab.js"></script>
    <script src="js/game/terraingenerator.js"></script>
    <script src="js/game/entityfactory.js"></script>
    <script src="js/game/gameworld.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/utils/profiler.js"></script>
    <script src="js/engine/priomengine.js"></script>

    <script>
    // ============================================================
    //  🚀 INICIO DEL MOTOR
    //  ============================================================
    (function() {
        console.log('🚀 Iniciando PRIOM V0.1');
        
        // Ocultar loading después de que cargue
        setTimeout(function() {
            document.getElementById('loading').classList.add('hidden');
        }, 1000);
        
        // Verificar que THREE.js está cargado
        if (typeof THREE === 'undefined') {
            console.error('❌ THREE.js no cargado');
            document.getElementById('loader-text').textContent = '❌ Error: THREE.js no cargado';
            return;
        }
        console.log('✅ THREE.js cargado:', THREE.REVISION);
        
        // Verificar que CONFIG está cargado
        if (typeof CONFIG === 'undefined') {
            console.error('❌ CONFIG no cargado');
            document.getElementById('loader-text').textContent = '❌ Error: CONFIG no cargado';
            return;
        }
        console.log('✅ CONFIG cargado');
        
        // Esperar a que todos los módulos carguen
        let intentos = 0;
        const maxIntentos = 20;
        
        function esperarMotor() {
            intentos++;
            console.log('⏳ Esperando motor... intento ' + intentos);
            
            if (typeof PriomEngine !== 'undefined') {
                console.log('✅ PriomEngine encontrado!');
                iniciarMotor();
                return;
            }
            
            if (intentos >= maxIntentos) {
                console.error('❌ Tiempo de espera agotado');
                document.getElementById('loader-text').textContent = '❌ Tiempo de espera agotado';
                return;
            }
            
            setTimeout(esperarMotor, 500);
        }
        
        function iniciarMotor() {
            try {
                console.log('🚀 Creando instancia del motor...');
                const engine = new PriomEngine();
                window.engine = engine;
                console.log('✅ Motor creado:', engine);
                
                // Auto-spawn después de 3 segundos
                setTimeout(function() {
                    console.log('🌍 Auto-spawn...');
                    try {
                        if (engine.modules && engine.modules.gameWorld) {
                            engine.modules.gameWorld._generateWorld();
                            console.log('✅ Mundo generado desde GameWorld');
                        } else {
                            // Fallback: usar botón
                            var btn = document.getElementById('btn-spawn');
                            if (btn) btn.click();
                        }
                    } catch(e) {
                        console.warn('⚠️ Auto-spawn falló:', e);
                    }
                }, 3000);
                
                // Configurar botón Spawn
                document.getElementById('btn-spawn').addEventListener('click', function() {
                    console.log('🔄 Spawn clickeado');
                    try {
                        if (engine.modules && engine.modules.gameWorld) {
                            engine.modules.gameWorld._generateWorld();
                            mostrarNotificacion('🌍 Mundo regenerado!');
                        }
                    } catch(e) {
                        console.error('❌ Error:', e);
                        mostrarNotificacion('❌ Error: ' + e.message);
                    }
                });
                
                // Configurar botón Reset
                document.getElementById('btn-reset').addEventListener('click', function() {
                    console.log('🔄 Reset clickeado');
                    try {
                        if (engine.modules && engine.modules.gameWorld) {
                            engine.modules.gameWorld._generateWorld();
                            mostrarNotificacion('🔄 Mundo reiniciado');
                        }
                    } catch(e) {
                        console.error('❌ Error:', e);
                        mostrarNotificacion('❌ Error: ' + e.message);
                    }
                });
                
                // Configurar botones de calidad
                document.getElementById('btn-low').addEventListener('click', function() {
                    if (engine.modules && engine.modules.renderer) {
                        engine.modules.renderer.setQuality('low');
                        mostrarNotificacion('🔽 Calidad: Baja');
                    }
                });
                
                document.getElementById('btn-ultra').addEventListener('click', function() {
                    if (engine.modules && engine.modules.renderer) {
                        engine.modules.renderer.setQuality('ultra');
                        mostrarNotificacion('⚡ Calidad: Ultra');
                    }
                });
                
                document.getElementById('loader-text').textContent = '✅ ¡Motor listo!';
                
            } catch(e) {
                console.error('❌ Error al iniciar motor:', e);
                document.getElementById('loader-text').textContent = '❌ Error: ' + e.message;
            }
        }
        
        function mostrarNotificacion(msg) {
            const container = document.getElementById('notif');
            const div = document.createElement('div');
            div.className = 'notif';
            div.textContent = msg;
            container.appendChild(div);
            setTimeout(function() {
                if (div.parentNode) div.remove();
            }, 3000);
        }
        
        // Iniciar espera
        setTimeout(esperarMotor, 1000);
        
    })();
    </script>

</body>
</html>
