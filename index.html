<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧠 PRIOM V0.1</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;background:#0a0a0f;font-family:'Segoe UI',sans-serif;color:#fff}
        canvas{display:block;width:100vw;height:100vh}
        #info{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10;pointer-events:none}
        #info h1{font-size:32px;background:linear-gradient(135deg,#7c3aed,#06b6d4,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        #info p{color:#6b7280;margin-top:8px}
        #stats{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);padding:10px 20px;border-radius:12px;z-index:10;font-size:12px;color:#9ca3af}
        #stats span{color:#fff;font-weight:600}
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="info">
        <h1>🧠 PRIOM V0.1</h1>
        <p>Inicializando motor...</p>
    </div>

    <div id="stats">
        FPS: <span id="fps">0</span> | Entidades: <span id="entities">0</span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
    // ============================================================
    //  🚀 PRIOM V0.1 - TODO EN UN SOLO ARCHIVO
    //  ============================================================
    (function() {
        'use strict';

        console.log('🚀 PRIOM V0.1 - Versión Todo-en-Uno');

        // ===== VERIFICAR THREE.JS =====
        if (typeof THREE === 'undefined') {
            document.querySelector('#info p').textContent = '❌ Error: THREE.js no cargado';
            return;
        }
        console.log('✅ THREE.js cargado');

        // ===== CONFIGURACIÓN =====
        const CONFIG = {
            maxEntities: 10000,
            worldSize: 500,
            treeDensity: 0.3
        };

        // ===== SOA MANAGER (simplificado) =====
        class SoaManager {
            constructor(max) {
                this.max = max || 10000;
                this.count = 0;
                this.active = new Uint8Array(this.max);
                this.posX = new Float32Array(this.max);
                this.posY = new Float32Array(this.max);
                this.posZ = new Float32Array(this.max);
                this.scale = new Float32Array(this.max);
                this.rotY = new Float32Array(this.max);
                this.colR = new Uint8Array(this.max);
                this.colG = new Uint8Array(this.max);
                this.colB = new Uint8Array(this.max);
                this.isTree = new Uint8Array(this.max);
                this.isRock = new Uint8Array(this.max);
                this.isAnimal = new Uint8Array(this.max);
                this.isGeometry = new Uint8Array(this.max);
                this.scale.fill(1);
            }
            createEntity(x, y, z) {
                if (this.count >= this.max) return -1;
                const id = this.count++;
                this.posX[id] = x;
                this.posY[id] = y;
                this.posZ[id] = z;
                this.active[id] = 1;
                this.colR[id] = 200;
                this.colG[id] = 200;
                this.colB[id] = 200;
                return id;
            }
            getActive() {
                const result = [];
                for (let i = 0; i < this.count; i++) {
                    if (this.active[i]) result.push(i);
                }
                return result;
            }
            reset() {
                this.count = 0;
                this.active.fill(0);
            }
        }

        // ===== ENTITY FACTORY (simplificado) =====
        class EntityFactory {
            constructor(soa) {
                this.soa = soa;
            }
            createTree(x, y, z) {
                const id = this.soa.createEntity(x, y, z);
                if (id !== -1) {
                    this.soa.isTree[id] = 1;
                    this.soa.colR[id] = 30 + Math.random() * 70;
                    this.soa.colG[id] = 50 + Math.random() * 90;
                    this.soa.colB[id] = 10 + Math.random() * 40;
                    this.soa.scale[id] = 0.5 + Math.random() * 3;
                    this.soa.rotY[id] = Math.random() * Math.PI * 2;
                }
                return id;
            }
            createRock(x, y, z) {
                const id = this.soa.createEntity(x, y, z);
                if (id !== -1) {
                    this.soa.isRock[id] = 1;
                    this.soa.colR[id] = 60 + Math.random() * 80;
                    this.soa.colG[id] = 50 + Math.random() * 70;
                    this.soa.colB[id] = 40 + Math.random() * 60;
                    this.soa.scale[id] = 0.5 + Math.random() * 4;
                }
                return id;
            }
            createAnimal(x, y, z) {
                const id = this.soa.createEntity(x, y, z);
                if (id !== -1) {
                    this.soa.isAnimal[id] = 1;
                    this.soa.colR[id] = 180 + Math.random() * 75;
                    this.soa.colG[id] = 150 + Math.random() * 50;
                    this.soa.colB[id] = 100 + Math.random() * 50;
                    this.soa.scale[id] = 0.2 + Math.random() * 0.5;
                    this.soa.rotY[id] = Math.random() * Math.PI * 2;
                }
                return id;
            }
            createGeometry(x, y, z, type) {
                const id = this.soa.createEntity(x, y, z);
                if (id !== -1) {
                    this.soa.isGeometry[id] = 1;
                    const colors = [
                        [180,80,255],[80,200,255],[255,200,80],
                        [80,255,180],[255,120,120],[200,200,200]
                    ];
                    const c = colors[type % colors.length];
                    this.soa.colR[id] = c[0];
                    this.soa.colG[id] = c[1];
                    this.soa.colB[id] = c[2];
                    this.soa.scale[id] = 0.5 + Math.random() * 1.5;
                    this.soa.rotY[id] = Math.random() * Math.PI * 2;
                }
                return id;
            }
        }

        // ===== GENERAR MUNDO =====
        function generateWorld(soa, factory) {
            console.log('🌍 Generando mundo...');
            soa.reset();
            let total = 0;

            // Árboles (300)
            for (let i = 0; i < 300; i++) {
                const x = (Math.random() - 0.5) * 400;
                const z = (Math.random() - 0.5) * 400;
                const y = 0.5 + Math.random() * 3;
                const id = factory.createTree(x, y, z);
                if (id !== -1) total++;
            }

            // Rocas (80)
            for (let i = 0; i < 80; i++) {
                const x = (Math.random() - 0.5) * 400;
                const z = (Math.random() - 0.5) * 400;
                const y = 0.5 + Math.random() * 2;
                const id = factory.createRock(x, y, z);
                if (id !== -1) total++;
            }

            // Animales (30)
            for (let i = 0; i < 30; i++) {
                const x = (Math.random() - 0.5) * 300;
                const z = (Math.random() - 0.5) * 300;
                const y = 0.5 + Math.random() * 0.5;
                const id = factory.createAnimal(x, y, z);
                if (id !== -1) total++;
            }

            // Figuras geométricas (20)
            for (let i = 0; i < 20; i++) {
                const angle = (i / 20) * Math.PI * 2;
                const x = Math.cos(angle) * 50;
                const z = Math.sin(angle) * 50;
                const y = 5 + Math.sin(i * 0.5) * 3;
                const id = factory.createGeometry(x, y, z, i);
                if (id !== -1) total++;
            }

            console.log(`✅ Mundo generado: ${soa.count} entidades`);
            document.getElementById('entities').textContent = soa.count;
            return soa.count;
        }

        // ===== RENDERER =====
        const canvas = document.getElementById('gameCanvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1f);
        scene.fog = new THREE.FogExp2(0x0a0a1f, 0.001);

        // Cámara
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1500);
        camera.position.set(60, 40, 60);
        camera.lookAt(0, 0, 0);

        // Luces
        const ambient = new THREE.AmbientLight(0x4466aa, 0.6);
        scene.add(ambient);
        const hemi = new THREE.HemisphereLight(0x8888ff, 0x444422, 0.8);
        scene.add(hemi);
        const sun = new THREE.DirectionalLight(0xffaa44, 1.8);
        sun.position.set(100, 180, 100);
        sun.castShadow = true;
        scene.add(sun);

        // Geometrías
        const geoBox = new THREE.BoxGeometry(0.8, 0.8, 0.8);
        const geoCone = new THREE.ConeGeometry(0.4, 0.8, 5);
        const geoSphere = new THREE.SphereGeometry(0.5, 8, 8);
        const geoCylinder = new THREE.CylinderGeometry(0.4, 0.4, 0.8, 6);
        const geoDodeca = new THREE.DodecahedronGeometry(0.5);

        // Materiales
        const matTree = new THREE.MeshStandardMaterial({ roughness: 0.7, metalness: 0, color: 0x3d7a2a, flatShading: true });
        const matRock = new THREE.MeshStandardMaterial({ roughness: 0.9, metalness: 0, color: 0x8a7a6a, flatShading: true });
        const matAnimal = new THREE.MeshStandardMaterial({ roughness: 0.8, metalness: 0, color: 0x8a7a5a });
        const matGeo = new THREE.MeshStandardMaterial({ roughness: 0.3, metalness: 0.6, envMapIntensity: 0.5 });

        function getGeo(type) {
            switch(type) {
                case 0: return geoBox;
                case 1: return geoSphere;
                case 2: return geoCylinder;
                case 3: return geoCone;
                default: return geoBox;
            }
        }

        function getMat(type) {
            if (type === 'tree') return matTree;
            if (type === 'rock') return matRock;
            if (type === 'animal') return matAnimal;
            return matGeo;
        }

        // ===== INSTANCIAS =====
        const meshes = new Map();

        function render(soa) {
            const active = soa.getActive();
            const camPos = camera.position;

            // Limpiar meshes viejos
            for (const [key, mesh] of meshes) {
                if (mesh.parent) scene.remove(mesh);
            }
            meshes.clear();

            // Agrupar por tipo
            const groups = new Map();
            for (const id of active) {
                const dx = soa.posX[id] - camPos.x;
                const dz = soa.posZ[id] - camPos.z;
                if (dx*dx + dz*dz > 400*400) continue;

                let key = 'box';
                if (soa.isTree[id]) key = 'tree';
                else if (soa.isRock[id]) key = 'rock';
                else if (soa.isAnimal[id]) key = 'animal';
                else if (soa.isGeometry[id]) key = 'geo';

                if (!groups.has(key)) groups.set(key, []);
                groups.get(key).push(id);
            }

            const dummy = new THREE.Object3D();
            const color = new THREE.Color();

            for (const [key, ids] of groups) {
                const geo = key === 'tree' ? geoCone : 
                           key === 'rock' ? geoDodeca :
                           key === 'animal' ? geoSphere : getGeo(0);
                const mat = getMat(key);
                const mesh = new THREE.InstancedMesh(geo, mat, ids.length);
                mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
                if (mesh.instanceColor) mesh.instanceColor.setUsage(THREE.DynamicDrawUsage);

                for (let i = 0; i < ids.length; i++) {
                    const id = ids[i];
                    const s = soa.scale[id] || 1;
                    dummy.position.set(soa.posX[id], soa.posY[id], soa.posZ[id]);
                    dummy.rotation.y = soa.rotY[id] || 0;
                    dummy.scale.set(s, s, s);
                    dummy.updateMatrix();
                    mesh.setMatrixAt(i, dummy.matrix);
                    color.setRGB(soa.colR[id]/255, soa.colG[id]/255, soa.colB[id]/255);
                    mesh.setColorAt(i, color);
                }

                mesh.count = ids.length;
                mesh.instanceMatrix.needsUpdate = true;
                if (mesh.instanceColor) mesh.instanceColor.needsUpdate = true;
                scene.add(mesh);
                meshes.set(key, mesh);
            }

            // Cámara orbital
            const t = Date.now() * 0.00004;
            const radius = 80 + Math.sin(t * 0.12) * 15;
            camera.position.x = Math.cos(t) * radius;
            camera.position.z = Math.sin(t) * radius;
            camera.position.y = 25 + Math.sin(t * 0.25) * 8;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }

        // ===== LOOP =====
        const soa = new SoaManager(CONFIG.maxEntities);
        const factory = new EntityFactory(soa);

        let frameCount = 0;
        let lastFpsUpdate = 0;

        function loop(time) {
            if (frameCount === 0) {
                generateWorld(soa, factory);
            }

            render(soa);

            frameCount++;
            if (time - lastFpsUpdate > 1000) {
                document.getElementById('fps').textContent = Math.round(frameCount / ((time - lastFpsUpdate) / 1000));
                frameCount = 0;
                lastFpsUpdate = time;
            }

            requestAnimationFrame(loop);
        }

        // ===== REDIMENSIONAR =====
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ===== INICIO =====
        document.querySelector('#info p').textContent = '🚀 Motor iniciado! Generando mundo...';
        setTimeout(() => {
            document.querySelector('#info').style.display = 'none';
        }, 2000);

        requestAnimationFrame(loop);

        console.log('✅ Motor listo!');

    })();
    </script>

</body>
</html>
