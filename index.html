<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎮 Beagle en el Mundo Mágico - PRIOM V0.1</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;background:#0a0a0f;font-family:'Segoe UI',sans-serif;color:#fff}
        canvas{display:block;width:100vw;height:100vh}
        #hud{position:fixed;top:15px;left:15px;background:rgba(0,0,0,0.5);padding:10px 16px;border-radius:16px;border:1px solid rgba(255,255,255,0.1);z-index:100;pointer-events:none;backdrop-filter:blur(10px)}
        #hud .logo{font-size:16px;font-weight:900;background:linear-gradient(135deg,#f59e0b,#ef4444,#ec4899,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 40px rgba(245,158,11,0.2)}
        #hud .subtitle{font-size:8px;color:#a78bfa;margin-top:2px;letter-spacing:1px}
        #stats{position:fixed;top:15px;right:15px;background:rgba(0,0,0,0.5);padding:8px 14px;border-radius:16px;z-index:100;pointer-events:none;font-size:8px;min-width:100px;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.05)}
        #stats .stat{display:flex;justify-content:space-between;padding:2px 0;color:#9ca3af;border-bottom:1px solid rgba(255,255,255,0.03)}
        #stats .stat:last-child{border-bottom:none}
        #stats .stat .v{color:#fff;font-weight:600}
        #stats .stat .v.gold{color:#fbbf24}
        #stats .stat .v.pink{color:#ec4899}
        #loading{position:fixed;inset:0;background:linear-gradient(135deg,#0a0a0f,#1a0a2e);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;transition:opacity 0.8s}
        #loading.hidden{opacity:0;pointer-events:none}
        .loader-icon{font-size:72px;animation:bounce 1.5s ease-in-out infinite;filter:drop-shadow(0 0 30px rgba(245,158,11,0.3))}
        @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
        .loader-title{font-size:32px;font-weight:900;background:linear-gradient(135deg,#f59e0b,#ef4444,#ec4899,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .loader-text{color:#a78bfa;font-size:14px;margin-top:12px}
        .loader-bar{width:200px;height:4px;background:rgba(255,255,255,0.06);border-radius:4px;margin-top:16px;overflow:hidden}
        .loader-fill{height:100%;width:0%;background:linear-gradient(90deg,#f59e0b,#ef4444,#ec4899);border-radius:4px;transition:width 0.3s}
        @media(max-width:768px){#hud{padding:6px 12px}#hud .logo{font-size:13px}#stats{padding:4px 8px;min-width:80px;font-size:7px}}
    </style>
</head>
<body>

    <div id="loading">
        <div class="loader-icon">🌟</div>
        <div class="loader-title">PRIOM V0.1</div>
        <div class="loader-text" id="loader-text">Creando el mundo mágico...</div>
        <div class="loader-bar"><div class="loader-fill" id="loader-fill" style="width:0%"></div></div>
    </div>

    <div id="hud">
        <div class="logo">🌟 Beagle en el Mundo Mágico</div>
        <div class="subtitle">✦ Estilo Pixar · Colores vibrantes · Mundo de ensueño ✦</div>
    </div>

    <div id="stats">
        <div class="stat">FPS <span class="v gold" id="fps">0</span></div>
        <div class="stat">✨ Flores <span class="v pink" id="flowers">0</span></div>
        <div class="stat">🌿 Árboles <span class="v" id="trees">0</span></div>
        <div class="stat">🌟 Estrellas <span class="v gold" id="stars">0</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
    (function() {
        'use strict';

        console.log('🌟 PRIOM V0.1 - Mundo Mágico (Estilo Pixar)');
        console.log('🎨 Colores vibrantes · Geometría encantadora · Beagle feliz');

        function updateLoader(p, t) {
            document.getElementById('loader-fill').style.width = Math.min(100, p) + '%';
            document.getElementById('loader-text').textContent = t || 'Cargando...';
        }

        if (typeof THREE === 'undefined') {
            document.getElementById('loader-text').textContent = '❌ Error';
            return;
        }

        // ============================================================
        //  CONFIGURACIÓN
        //  ============================================================
        const CONFIG = { maxEntities: 50000, targetFPS: 60 };

        // ============================================================
        //  SOA MANAGER (simplificado)
        //  ============================================================
        class SoaManager {
            constructor(max) {
                this.max = max || 50000;
                this.count = 0;
                this.active = new Uint8Array(this.max);
                this.posX = new Float32Array(this.max);
                this.posY = new Float32Array(this.max);
                this.posZ = new Float32Array(this.max);
                this.scale = new Float32Array(this.max);
                this.rotY = new Float32Array(this.max);
                this.rotX = new Float32Array(this.max);
                this.rotZ = new Float32Array(this.max);
                this.colR = new Uint8Array(this.max);
                this.colG = new Uint8Array(this.max);
                this.colB = new Uint8Array(this.max);
                this.isFlower = new Uint8Array(this.max);
                this.isTree = new Uint8Array(this.max);
                this.isBeagle = new Uint8Array(this.max);
                this.isStar = new Uint8Array(this.max);
                this.isParticle = new Uint8Array(this.max);
                this.scale.fill(1);
            }
            createEntity(x, y, z) {
                if (this.count >= this.max) return -1;
                const id = this.count++;
                this.posX[id] = x;
                this.posY[id] = y;
                this.posZ[id] = z;
                this.active[id] = 1;
                this.colR[id] = 200;
                this.colG[id] = 200;
                this.colB[id] = 200;
                this.scale[id] = 1;
                return id;
            }
            getActive() {
                const result = [];
                for (let i = 0; i < this.count; i++) {
                    if (this.active[i]) result.push(i);
                }
                return result;
            }
            updatePhysics(delta) {
                const active = this.getActive();
                const time = Date.now() * 0.001;
                for (const id of active) {
                    if (this.isStar[id]) {
                        this.rotY[id] += delta * 0.5;
                        this.posY[id] += Math.sin(time * 0.5 + id) * delta * 0.02;
                    }
                    if (this.isParticle[id]) {
                        this.posY[id] += Math.sin(time * 0.2 + id) * delta * 0.03;
                        this.posX[id] += Math.sin(time * 0.1 + id) * delta * 0.02;
                        this.posZ[id] += Math.cos(time * 0.1 + id * 0.7) * delta * 0.02;
                    }
                }
            }
            reset() { this.count = 0; this.active.fill(0); }
        }

        // ============================================================
        //  GENERADOR MÁGICO (Estilo Pixar)
        //  ============================================================
        class MagicGenerator {
            constructor(soa) {
                this.soa = soa;
                this.dirTimer = 0;
            }

            generate() {
                console.log('✨ Generando mundo mágico...');
                this.soa.reset();
                let total = 0;

                updateLoader(20, '🌸 Plantando flores mágicas...');

                // ===== FLORES (1500) - Coloridas y brillantes =====
                const flowerColors = [
                    [255,100,150],[255,200,100],[200,100,255],
                    [255,150,200],[100,200,255],[255,100,100],
                    [255,255,200],[200,200,100],[100,255,200],
                    [255,200,255],[200,255,200],[255,200,50]
                ];
                for (let i = 0; i < 1500; i++) {
                    const x = (Math.random() - 0.5) * 200;
                    const z = (Math.random() - 0.5) * 200;
                    const y = 0.1 + Math.random() * 0.3;
                    const id = this.soa.createEntity(x, y, z);
                    if (id !== -1) {
                        this.soa.isFlower[id] = 1;
                        const c = flowerColors[Math.floor(Math.random() * flowerColors.length)];
                        this.soa.colR[id] = c[0];
                        this.soa.colG[id] = c[1];
                        this.soa.colB[id] = c[2];
                        this.soa.scale[id] = 0.12 + Math.random() * 0.15;
                        this.soa.rotY[id] = Math.random() * Math.PI * 2;
                        total++;
                    }
                }

                updateLoader(40, '🌳 Creando árboles de cuento...');

                // ===== ÁRBOLES (150) - Forma de caramelo =====
                for (let i = 0; i < 150; i++) {
                    const x = (Math.random() - 0.5) * 160;
                    const z = (Math.random() - 0.5) * 160;
                    const y = 0.3 + Math.random() * 0.3;
                    const id = this.soa.createEntity(x, y, z);
                    if (id !== -1) {
                        this.soa.isTree[id] = 1;
                        this.soa.colR[id] = 50 + Math.random() * 30;
                        this.soa.colG[id] = 100 + Math.random() * 40;
                        this.soa.colB[id] = 30 + Math.random() * 20;
                        this.soa.scale[id] = 0.8 + Math.random() * 1.5;
                        this.soa.rotY[id] = Math.random() * Math.PI * 2;
                        total++;
                    }
                }

                updateLoader(60, '🌟 Creando estrellas brillantes...');

                // ===== ESTRELLAS (80) - Doradas y girando =====
                for (let i = 0; i < 80; i++) {
                    const x = (Math.random() - 0.5) * 180;
                    const z = (Math.random() - 0.5) * 180;
                    const y = 1 + Math.random() * 5;
                    const id = this.soa.createEntity(x, y, z);
                    if (id !== -1) {
                        this.soa.isStar[id] = 1;
                        this.soa.colR[id] = 255;
                        this.soa.colG[id] = 215;
                        this.soa.colB[id] = 0;
                        this.soa.scale[id] = 0.2 + Math.random() * 0.2;
                        this.soa.rotY[id] = Math.random() * Math.PI * 2;
                        total++;
                    }
                }

                updateLoader(80, '🐾 Creando Beagle mágico...');

                // ===== BEAGLE =====
                const beagleId = this.soa.createEntity(0, 0.35, 0);
                if (beagleId !== -1) {
                    this.soa.isBeagle[beagleId] = 1;
                    this.soa.colR[beagleId] = 210;
                    this.soa.colG[beagleId] = 170;
                    this.soa.colB[beagleId] = 120;
                    this.soa.scale[beagleId] = 0.7;
                    window._beagleId = beagleId;
                    total++;
                }

                updateLoader(95, '✨ Creando partículas de luz...');

                // ===== PARTÍCULAS (500) - Brillan como polvo de hadas =====
                for (let i = 0; i < 500; i++) {
                    const x = (Math.random() - 0.5) * 200;
                    const z = (Math.random() - 0.5) * 200;
                    const y = 0.5 + Math.random() * 4;
                    const id = this.soa.createEntity(x, y, z);
                    if (id !== -1) {
                        this.soa.isParticle[id] = 1;
                        this.soa.colR[id] = 255;
                        this.soa.colG[id] = 235;
                        this.soa.colB[id] = 200;
                        this.soa.scale[id] = 0.03 + Math.random() * 0.04;
                        total++;
                    }
                }

                updateLoader(100, '🌟 ¡Mundo mágico listo!');

                document.getElementById('flowers').textContent = '1,500';
                document.getElementById('trees').textContent = '150';
                document.getElementById('stars').textContent = '80';

                console.log(`✨ Mundo generado: ${this.soa.count} entidades`);
                return this.soa.count;
            }

            updateBeagle(delta) {
                const id = window._beagleId;
                if (id === undefined || id === -1) return;
                if (!this.soa.active[id]) return;

                const speed = 0.8;
                this.dirTimer += delta;

                if (this.dirTimer > 2 + Math.random() * 3) {
                    this.dirTimer = 0;
                    const angle = (Math.random() - 0.5) * 2.5;
                    const currentAngle = Math.atan2(this.soa.velX[id] || 0, this.soa.velZ[id] || 0) || 0;
                    const newAngle = currentAngle + angle;
                    this.soa.velX[id] = Math.sin(newAngle) * speed;
                    this.soa.velZ[id] = Math.cos(newAngle) * speed;
                }

                this.soa.posX[id] += (this.soa.velX[id] || 0) * delta * 2;
                this.soa.posZ[id] += (this.soa.velZ[id] || 0) * delta * 2;

                if (Math.abs(this.soa.velX[id]) > 0.01 || Math.abs(this.soa.velZ[id]) > 0.01) {
                    const targetRot = Math.atan2(this.soa.velX[id] || 0, this.soa.velZ[id] || 0);
                    let diff = targetRot - (this.soa.rotY[id] || 0);
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    this.soa.rotY[id] += diff * delta * 3;
                }

                // Brinco feliz ocasional
                if (Math.random() < 0.001) {
                    this.soa.posY[id] = 0.6;
                    setTimeout(() => {
                        if (this.soa.active[id]) this.soa.posY[id] = 0.35;
                    }, 200);
                }

                const bound = 90;
                if (Math.abs(this.soa.posX[id]) > bound) this.soa.velX[id] *= -0.5;
                if (Math.abs(this.soa.posZ[id]) > bound) this.soa.velZ[id] *= -0.5;
            }
        }

        // ============================================================
        //  RENDERER - ESTILO PIXAR
        //  ============================================================
        const canvas = document.getElementById('gameCanvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.5;
        renderer.outputEncoding = THREE.sRGBEncoding;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a0a2e);
        scene.fog = new THREE.FogExp2(0x1a0a2e, 0.002);

        // ===== CÁMARA (sigue al Beagle) =====
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 300);
        camera.position.set(15, 12, 20);

        // ===== LUCES MÁGICAS =====
        // Luz ambiental suave (colorida)
        const ambient = new THREE.AmbientLight(0x443366, 0.5);
        scene.add(ambient);

        // Luz de hemisferio (cielo y suelo con colores mágicos)
        const hemi = new THREE.HemisphereLight(0x8888ff, 0x443366, 0.8);
        scene.add(hemi);

        // Luz principal (cálida, como sol de atardecer)
        const sun = new THREE.DirectionalLight(0xffaa66, 2.0);
        sun.position.set(50, 80, 30);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 1024;
        sun.shadow.mapSize.height = 1024;
        sun.shadow.camera.near = 0.5;
        sun.shadow.camera.far = 150;
        sun.shadow.camera.left = -50;
        sun.shadow.camera.right = 50;
        sun.shadow.camera.top = 50;
        sun.shadow.camera.bottom = -50;
        scene.add(sun);

        // Luz de relleno (azulada, para dar contraste)
        const fill = new THREE.DirectionalLight(0x6666ff, 0.5);
        fill.position.set(-30, 20, -30);
        scene.add(fill);

        // ===== GEOMETRÍAS ENCANTADAS =====
        // Flor (pétalos + centro)
        function createFlowerGeometry() {
            const group = new THREE.Group();
            
            // Pétalos (5 esferas achatadas alrededor)
            const petalMat = new THREE.MeshStandardMaterial({ roughness: 0.3, metalness: 0.1, emissiveIntensity: 0.05 });
            const petalGeo = new THREE.SphereGeometry(0.04, 6, 6);
            for (let i = 0; i < 5; i++) {
                const angle = (i / 5) * Math.PI * 2;
                const petal = new THREE.Mesh(petalGeo, petalMat);
                petal.position.set(Math.cos(angle) * 0.06, 0, Math.sin(angle) * 0.06);
                petal.scale.set(1, 0.3, 1);
                group.add(petal);
            }
            
            // Centro (brillante)
            const centerMat = new THREE.MeshStandardMaterial({ 
                roughness: 0.2, 
                metalness: 0.3, 
                emissive: new THREE.Color(0xffdd44), 
                emissiveIntensity: 0.2 
            });
            const center = new THREE.Mesh(new THREE.SphereGeometry(0.025, 6, 6), centerMat);
            center.position.y = 0.01;
            group.add(center);
            
            return group;
        }

        // Árbol (tronco + copa redondeada)
        function createTreeGeometry() {
            const group = new THREE.Group();
            
            // Tronco (curvo, estilo caricatura)
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x6B4F3C, roughness: 0.8 });
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.06, 0.3, 6), trunkMat);
            trunk.position.y = 0.15;
            group.add(trunk);
            
            // Copa (esfera achatada, como nube)
            const crownMat = new THREE.MeshStandardMaterial({ roughness: 0.6, metalness: 0, emissiveIntensity: 0.05 });
            const crown = new THREE.Mesh(new THREE.SphereGeometry(0.25, 6, 6), crownMat);
            crown.position.y = 0.45;
            crown.scale.set(1, 0.7, 1);
            group.add(crown);
            
            // Detalles de copa (pequeñas esferas)
            const detailMat = new THREE.MeshStandardMaterial({ roughness: 0.6, metalness: 0 });
            for (let i = 0; i < 3; i++) {
                const angle = (i / 3) * Math.PI * 2;
                const d = new THREE.Mesh(new THREE.SphereGeometry(0.08, 5, 5), detailMat);
                d.position.set(Math.cos(angle) * 0.2, 0.4 + Math.sin(angle * 1.5) * 0.1, Math.sin(angle) * 0.2);
                group.add(d);
            }
            
            return group;
        }

        // Estrella (3D brillante)
        function createStarGeometry() {
            const group = new THREE.Group();
            const starMat = new THREE.MeshStandardMaterial({ 
                color: 0xffdd44, 
                emissive: 0xffaa00, 
                emissiveIntensity: 0.5,
                roughness: 0.2,
                metalness: 0.5
            });
            
            // Cuerpo principal (octaedro)
            const star = new THREE.Mesh(new THREE.OctahedronGeometry(0.12, 0), starMat);
            group.add(star);
            
            // Puntas (pequeñas esferas)
            const tipMat = new THREE.MeshStandardMaterial({ color: 0xffdd44, emissive: 0xffaa00, emissiveIntensity: 0.3 });
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                const tip = new THREE.Mesh(new THREE.SphereGeometry(0.03, 4, 4), tipMat);
                tip.position.set(Math.cos(angle) * 0.15, Math.sin(angle * 0.5) * 0.05, Math.sin(angle) * 0.15);
                group.add(tip);
            }
            
            return group;
        }

        // Beagle (estilo Pixar)
        function createBeagleGeometry() {
            const group = new THREE.Group();
            
            // Cuerpo (suave, redondeado)
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xD4A574, roughness: 0.5, metalness: 0 });
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.3, 10, 10), bodyMat);
            body.scale.set(1, 0.8, 1.2);
            body.position.y = 0.25;
            group.add(body);
            
            // Cabeza (redonda, grande)
            const headMat = new THREE.MeshStandardMaterial({ color: 0xE8C99E, roughness: 0.5 });
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 10, 10), headMat);
            head.position.set(0.38, 0.42, 0);
            group.add(head);
            
            // Hocico (prominente)
            const snoutMat = new THREE.MeshStandardMaterial({ color: 0xD4A574, roughness: 0.6 });
            const snout = new THREE.Mesh(new THREE.SphereGeometry(0.09, 8, 8), snoutMat);
            snout.position.set(0.52, 0.38, 0);
            snout.scale.set(1, 0.8, 0.8);
            group.add(snout);
            
            // Nariz (negra, brillante)
            const noseMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.2, metalness: 0.1 });
            const nose = new THREE.Mesh(new THREE.SphereGeometry(0.035, 8, 8), noseMat);
            nose.position.set(0.58, 0.38, 0);
            group.add(nose);
            
            // Ojos (grandes, expresivos)
            const eyeWhiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.1 });
            const eyePupilMat = new THREE.MeshStandardMaterial({ color: 0x1a1a0a, roughness: 0.1 });
            for (const side of [-0.07, 0.07]) {
                const white = new THREE.Mesh(new THREE.SphereGeometry(0.045, 8, 8), eyeWhiteMat);
                white.position.set(0.44, 0.46, side);
                group.add(white);
                const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.025, 8, 8), eyePupilMat);
                pupil.position.set(0.47, 0.46, side * 1.1);
                group.add(pupil);
            }
            
            // Orejas (colgantes, grandes)
            const earMat = new THREE.MeshStandardMaterial({ color: 0x8B6B4D, roughness: 0.7 });
            for (const side of [-0.1, 0.1]) {
                const ear = new THREE.Mesh(new THREE.SphereGeometry(0.07, 8, 8), earMat);
                ear.position.set(0.32, 0.34, side);
                ear.scale.set(0.8, 1.3, 0.6);
                group.add(ear);
            }
            
            // Cola (blanca, movible)
            const tailMat = new THREE.MeshStandardMaterial({ color: 0xF5E6D0, roughness: 0.7 });
            const tail = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.035, 0.15, 6), tailMat);
            tail.position.set(-0.38, 0.12, 0);
            tail.rotation.z = 0.4;
            group.add(tail);
            group._tail = tail;
            
            // Patas (cortas, redondas)
            const legMat = new THREE.MeshStandardMaterial({ color: 0xE8D5B8, roughness: 0.6 });
            const legPositions = [[-0.18, 0, 0.1], [-0.18, 0, -0.1], [0.18, 0, 0.1], [0.18, 0, -0.1]];
            for (const p of legPositions) {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.035, 0.12, 6), legMat);
                leg.position.set(p[0], p[1], p[2]);
                group.add(leg);
                // Pata redonda
                const foot = new THREE.Mesh(new THREE.SphereGeometry(0.035, 6, 6), legMat);
                foot.position.set(p[0], -0.06, p[2]);
                group.add(foot);
            }
            
            // Mancha en el lomo (marca Beagle)
            const spotMat = new THREE.MeshStandardMaterial({ color: 0x8B6B4D, roughness: 0.6 });
            const spot = new THREE.Mesh(new THREE.SphereGeometry(0.08, 6, 6), spotMat);
            spot.position.set(0, 0.32, 0.18);
            spot.scale.set(0.8, 0.3, 0.5);
            group.add(spot);
            
            return group;
        }

        // ============================================================
        //  INSTANCIAS DE GEOMETRÍAS
        //  ============================================================
        const flowerGroup = createFlowerGeometry();
        const treeGroup = createTreeGeometry();
        const starGroup = createStarGeometry();
        let beagleGroup = null;

        const flowerMeshes = [];
        const treeMeshes = [];
        const starMeshes = [];
        let particleSystem = null;

        // Materiales compartidos
        const particleMat = new THREE.PointsMaterial({
            size: 0.06,
            vertexColors: true,
            transparent: true,
            opacity: 0.5,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            sizeAttenuation: true
        });

        function renderScene(soa) {
            const active = soa.getActive();
            
            // Limpiar
            for (const m of flowerMeshes) scene.remove(m);
            for (const m of treeMeshes) scene.remove(m);
            for (const m of starMeshes) scene.remove(m);
            flowerMeshes.length = 0;
            treeMeshes.length = 0;
            starMeshes.length = 0;
            if (particleSystem) { scene.remove(particleSystem); particleSystem = null; }
            if (beagleGroup) { scene.remove(beagleGroup); beagleGroup = null; }

            const flowerData = [];
            const treeData = [];
            const starData = [];
            const beagleData = [];
            const particlePos = [];
            const particleCol = [];

            for (const id of active) {
                if (soa.isFlower[id]) {
                    flowerData.push({ 
                        pos: [soa.posX[id], soa.posY[id], soa.posZ[id]],
                        color: [soa.colR[id], soa.colG[id], soa.colB[id]],
                        scale: soa.scale[id],
                        rot: soa.rotY[id] || 0
                    });
                } else if (soa.isTree[id]) {
                    treeData.push({ 
                        pos: [soa.posX[id], soa.posY[id], soa.posZ[id]],
                        scale: soa.scale[id],
                        rot: soa.rotY[id] || 0
                    });
                } else if (soa.isStar[id]) {
                    starData.push({ 
                        pos: [soa.posX[id], soa.posY[id], soa.posZ[id]],
                        scale: soa.scale[id],
                        rot: soa.rotY[id] || 0
                    });
                } else if (soa.isBeagle[id]) {
                    beagleData.push({ 
                        pos: [soa.posX[id], soa.posY[id], soa.posZ[id]],
                        rotY: soa.rotY[id] || 0
                    });
                } else if (soa.isParticle[id]) {
                    particlePos.push(soa.posX[id], soa.posY[id], soa.posZ[id]);
                    particleCol.push(soa.colR[id]/255, soa.colG[id]/255, soa.colB[id]/255);
                }
            }

            // Renderizar flores (instanciado)
            if (flowerData.length > 0) {
                const mesh = new THREE.InstancedMesh(flowerGroup, flowerGroup.children[0].material, flowerData.length);
                const dummy = new THREE.Object3D();
                for (let i = 0; i < flowerData.length; i++) {
                    const d = flowerData[i];
                    dummy.position.set(d.pos[0], d.pos[1], d.pos[2]);
                    dummy.rotation.y = d.rot || 0;
                    dummy.scale.set(d.scale, d.scale, d.scale);
                    dummy.updateMatrix();
                    mesh.setMatrixAt(i, dummy.matrix);
                    const c = new THREE.Color();
                    c.setRGB(d.color[0]/255, d.color[1]/255, d.color[2]/255);
                    mesh.setColorAt(i, c);
                }
                mesh.count = flowerData.length;
                mesh.instanceMatrix.needsUpdate = true;
                if (mesh.instanceColor) mesh.instanceColor.needsUpdate = true;
                scene.add(mesh);
                flowerMeshes.push(mesh);
            }

            // Renderizar árboles (instanciado)
            if (treeData.length > 0) {
                const mesh = new THREE.InstancedMesh(treeGroup, treeGroup.children[0].material, treeData.length);
                const dummy = new THREE.Object3D();
                for (let i = 0; i < treeData.length; i++) {
                    const d = treeData[i];
                    dummy.position.set(d.pos[0], d.pos[1], d.pos[2]);
                    dummy.rotation.y = d.rot || 0;
                    const s = d.scale * 0.5;
                    dummy.scale.set(s, s, s);
                    dummy.updateMatrix();
                    mesh.setMatrixAt(i, dummy.matrix);
                    const c = new THREE.Color();
                    c.setRGB(50/255 + Math.random()*0.1, 100/255 + Math.random()*0.1, 30/255);
                    mesh.setColorAt(i, c);
                }
                mesh.count = treeData.length;
                mesh.instanceMatrix.needsUpdate = true;
                if (mesh.instanceColor) mesh.instanceColor.needsUpdate = true;
                scene.add(mesh);
                treeMeshes.push(mesh);
            }

            // Renderizar estrellas (instanciado)
            if (starData.length > 0) {
                const mesh = new THREE.InstancedMesh(starGroup, starGroup.children[0].material, starData.length);
                const dummy = new THREE.Object3D();
                for (let i = 0; i < starData.length; i++) {
                    const d = starData[i];
                    dummy.position.set(d.pos[0], d.pos[1], d.pos[2]);
                    dummy.rotation.y = d.rot || 0;
                    dummy.scale.set(d.scale, d.scale, d.scale);
                    dummy.updateMatrix();
                    mesh.setMatrixAt(i, dummy.matrix);
                }
                mesh.count = starData.length;
                mesh.instanceMatrix.needsUpdate = true;
                scene.add(mesh);
                starMeshes.push(mesh);
            }

            // Renderizar Beagle
            if (beagleData.length > 0) {
                if (!beagleGroup) beagleGroup = createBeagleGeometry();
                const d = beagleData[0];
                beagleGroup.position.set(d.pos[0], d.pos[1], d.pos[2]);
                beagleGroup.rotation.y = d.rotY || 0;
                if (beagleGroup._tail) {
                    beagleGroup._tail.rotation.x = Math.sin(Date.now() * 0.003) * 0.3 + 0.3;
                }
                scene.add(beagleGroup);
            }

            // Renderizar partículas
            if (particlePos.length > 0) {
                const geo = new THREE.BufferGeometry();
                geo.setAttribute('position', new THREE.Float32BufferAttribute(particlePos, 3));
                geo.setAttribute('color', new THREE.Float32BufferAttribute(particleCol, 3));
                const points = new THREE.Points(geo, particleMat);
                scene.add(points);
                particleSystem = points;
            }

            // Cámara sigue al Beagle suavemente
            if (beagleData.length > 0) {
                const bId = window._beagleId;
                if (bId !== undefined && soa.active[bId]) {
                    const tX = soa.posX[bId], tZ = soa.posZ[bId];
                    const angle = soa.rotY[bId] || 0;
                    const dist = 14, height = 11;
                    const cX = tX - Math.sin(angle) * dist;
                    const cZ = tZ - Math.cos(angle) * dist;
                    camera.position.x += (cX - camera.position.x) * 0.02;
                    camera.position.z += (cZ - camera.position.z) * 0.02;
                    camera.position.y += (height + 1 - camera.position.y) * 0.02;
                    camera.lookAt(tX, 0.5, tZ);
                }
            }

            renderer.render(scene, camera);
        }

        // ============================================================
        //  INICIO
        //  ============================================================
        const soa = new SoaManager(CONFIG.maxEntities);
        const generator = new MagicGenerator(soa);

        let frameCount = 0, lastFpsUpdate = 0, worldGenerated = false;

        function gameLoop(time) {
            if (!worldGenerated) {
                generator.generate();
                worldGenerated = true;
                setTimeout(() => document.getElementById('loading').classList.add('hidden'), 500);
                document.getElementById('loader-text').textContent = '🌟 ¡Mundo mágico listo!';
            }

            const delta = 0.016;
            soa.updatePhysics(delta);
            generator.updateBeagle(delta);
            renderScene(soa);

            frameCount++;
            if (time - lastFpsUpdate > 1000) {
                const cfps = Math.round(frameCount / ((time - lastFpsUpdate) / 1000));
                document.getElementById('fps').textContent = cfps;
                document.getElementById('fps').className = 'v gold';
                document.getElementById('entities').textContent = soa.count;
                frameCount = 0;
                lastFpsUpdate = time;
            }

            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log('🌟 Iniciando mundo mágico...');
        requestAnimationFrame(gameLoop);

    })();
    </script>
</body>
</html>
