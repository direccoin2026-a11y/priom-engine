<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌿 Beagle en la Pradera - PRIOM V0.1</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;background:#0a0a0f;font-family:'Segoe UI',sans-serif;color:#fff}
        canvas{display:block;width:100vw;height:100vh}
        #hud{position:fixed;top:15px;left:15px;background:rgba(0,0,0,0.7);padding:10px 16px;border-radius:12px;border:1px solid rgba(124,58,237,0.2);z-index:100;pointer-events:none;backdrop-filter:blur(10px)}
        #hud .logo{font-size:16px;font-weight:900;background:linear-gradient(135deg,#7c3aed,#06b6d4,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        #hud .subtitle{font-size:8px;color:#6b7280;margin-top:2px}
        #stats{position:fixed;top:15px;right:15px;background:rgba(0,0,0,0.7);padding:8px 12px;border-radius:12px;z-index:100;pointer-events:none;font-size:8px;min-width:120px;backdrop-filter:blur(10px)}
        #stats .stat{display:flex;justify-content:space-between;padding:1px 0;color:#9ca3af;border-bottom:1px solid rgba(255,255,255,0.03)}
        #stats .stat:last-child{border-bottom:none}
        #stats .stat .v{color:#fff;font-weight:600}
        #stats .stat .v.good{color:#10b981}
        #stats .stat .v.warn{color:#f59e0b}
        #ai-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);padding:6px 16px;border-radius:20px;z-index:100;font-size:8px;display:flex;align-items:center;gap:12px;backdrop-filter:blur(10px);border:1px solid rgba(124,58,237,0.15)}
        #ai-bar .icon{font-size:14px}
        #ai-bar .text{color:#d1d5db}
        #ai-bar .text strong{color:#8b5cf6}
        #ai-bar .progress{width:80px;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
        #ai-bar .progress .fill{height:100%;background:linear-gradient(90deg,#7c3aed,#06b6d4,#10b981);border-radius:2px;transition:width 0.3s}
        #ai-bar .stats{color:#6b7280;display:flex;gap:8px}
        #ai-bar .stats .hl{color:#8b5cf6}
        #loading{position:fixed;inset:0;background:#0a0a0f;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;transition:opacity 0.8s}
        #loading.hidden{opacity:0;pointer-events:none}
        .loader-icon{font-size:64px;animation:pulse 1.5s ease-in-out infinite}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
        .loader-title{font-size:28px;font-weight:900;background:linear-gradient(135deg,#7c3aed,#06b6d4,#10b981,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .loader-text{color:#6b7280;font-size:14px;margin-top:12px}
        .loader-bar{width:200px;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;margin-top:16px;overflow:hidden}
        .loader-fill{height:100%;width:0%;background:linear-gradient(90deg,#7c3aed,#06b6d4,#10b981,#f59e0b);border-radius:2px;transition:width 0.3s}
        #notif{position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:200;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:4px}
        .notif{background:rgba(0,0,0,0.9);border:1px solid rgba(124,58,237,0.2);border-radius:8px;padding:6px 16px;font-size:11px;color:#fff;animation:slideDown 0.3s ease, fadeOut 0.3s 3s ease forwards}
        @keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeOut{to{opacity:0;transform:translateY(-10px)}}
        @media(max-width:768px){#hud{padding:6px 12px}#hud .logo{font-size:12px}#stats{padding:4px 8px;min-width:80px;font-size:7px}#ai-bar{padding:4px 12px;gap:6px;font-size:7px}#ai-bar .progress{width:40px}}
    </style>
</head>
<body>

    <div id="loading">
        <div class="loader-icon">🌿</div>
        <div class="loader-title">PRIOM V0.1</div>
        <div class="loader-text" id="loader-text">Activando TODOS los componentes...</div>
        <div class="loader-bar"><div class="loader-fill" id="loader-fill" style="width:0%"></div></div>
    </div>

    <div id="hud">
        <div class="logo">🌿 Beagle en la Pradera</div>
        <div class="subtitle">🚀 100% POTENCIA · IA Dual · LOD · Bloom · Ciclo Día/Noche</div>
    </div>

    <div id="stats">
        <div class="stat">FPS <span class="v good" id="fps">0</span></div>
        <div class="stat">Entidades <span class="v" id="entities">0</span></div>
        <div class="stat">🌿 Pasto <span class="v" id="grass">0</span></div>
        <div class="stat">🌸 Flores <span class="v" id="flowers">0</span></div>
        <div class="stat">Calidad <span class="v" id="quality">ULTRA</span></div>
        <div class="stat">LOD <span class="v" id="lod">0</span>m</div>
    </div>

    <div id="ai-bar">
        <span class="icon">🧠</span>
        <span class="text"><strong id="ai-action">IA DUAL</strong> <span id="ai-detail">· Optimizando</span></span>
        <div class="progress"><div class="fill" id="ai-fill" style="width:100%"></div></div>
        <div class="stats">
            <span>🎯 <span class="hl" id="ai-conf">100%</span></span>
            <span>🧬 <span class="hl" id="ai-meta">100%</span></span>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
    (function() {
        'use strict';

        console.log('🚀 PRIOM V0.1 - 100% POTENCIA ACTIVADA');
        console.log('🧠 IA Dual · 🎯 LOD · 🌊 Bloom · 🌄 Terreno · 🌅 Día/Noche');

        function updateLoader(p, t) {
            document.getElementById('loader-fill').style.width = Math.min(100, p) + '%';
            document.getElementById('loader-text').textContent = t || 'Cargando...';
        }

        updateLoader(5, 'Inicializando motor...');

        if (typeof THREE === 'undefined') {
            document.getElementById('loader-text').textContent = '❌ Error: THREE.js no cargado';
            return;
        }

        // ============================================================
        //  CONFIGURACIÓN
        //  ============================================================
        const CONFIG = {
            maxEntities: 120000,
            targetFPS: 60,
            quality: 'ultra',
            lodDistance: 200,
            gravity: -9.8,
            windStrength: 0.6
        };

        // ============================================================
        //  SOA MANAGER
        //  ============================================================
        class SoaManager {
            constructor(max) {
                this.max = max || 120000;
                this.count = 0;
                this.active = new Uint8Array(this.max);
                this.posX = new Float32Array(this.max);
                this.posY = new Float32Array(this.max);
                this.posZ = new Float32Array(this.max);
                this.velX = new Float32Array(this.max);
                this.velY = new Float32Array(this.max);
                this.velZ = new Float32Array(this.max);
                this.scale = new Float32Array(this.max);
                this.rotY = new Float32Array(this.max);
                this.rotX = new Float32Array(this.max);
                this.rotZ = new Float32Array(this.max);
                this.colR = new Uint8Array(this.max);
                this.colG = new Uint8Array(this.max);
                this.colB = new Uint8Array(this.max);
                this.isGrass = new Uint8Array(this.max);
                this.isFlower = new Uint8Array(this.max);
                this.isTree = new Uint8Array(this.max);
                this.isBeagle = new Uint8Array(this.max);
                this.isBee = new Uint8Array(this.max);
                this.isBird = new Uint8Array(this.max);
                this.isWater = new Uint8Array(this.max);
                this.isParticle = new Uint8Array(this.max);
                this.life = new Float32Array(this.max);
                this.windOffset = new Float32Array(this.max);
                this.lodLevel = new Uint8Array(this.max);
                this.scale.fill(1);
                this.life.fill(1);
            }
            createEntity(x, y, z) {
                if (this.count >= this.max) return -1;
                const id = this.count++;
                this.posX[id] = x;
                this.posY[id] = y;
                this.posZ[id] = z;
                this.active[id] = 1;
                this.colR[id] = 200;
                this.colG[id] = 200;
                this.colB[id] = 200;
                this.scale[id] = 1;
                this.life[id] = 1;
                this.windOffset[id] = Math.random() * Math.PI * 2;
                return id;
            }
            getActive() {
                const result = [];
                for (let i = 0; i < this.count; i++) {
                    if (this.active[i]) result.push(i);
                }
                return result;
            }
            updatePhysics(delta, time, wind) {
                const active = this.getActive();
                for (const id of active) {
                    // Pasto con viento
                    if (this.isGrass[id]) {
                        const sway = Math.sin(time * 0.5 + this.windOffset[id]) * 0.025;
                        this.rotX[id] = sway + wind * 0.015;
                        this.rotZ[id] = Math.cos(time * 0.4 + this.windOffset[id]) * 0.025;
                    }
                    // Flores
                    if (this.isFlower[id]) {
                        const sway = Math.sin(time * 0.3 + this.windOffset[id]) * 0.035;
                        this.rotX[id] = sway;
                        this.rotZ[id] = Math.cos(time * 0.25 + this.windOffset[id]) * 0.035;
                    }
                    // Abejas
                    if (this.isBee[id]) {
                        this.posX[id] += Math.sin(time * 0.5 + id) * delta * 0.4;
                        this.posZ[id] += Math.cos(time * 0.7 + id * 0.5) * delta * 0.4;
                        this.posY[id] = 0.8 + Math.sin(time * 0.8 + id * 0.3) * 0.4;
                        this.rotY[id] += delta * 0.6;
                    }
                    // Aves
                    if (this.isBird[id]) {
                        this.posX[id] += Math.sin(time * 0.15 + id) * delta * 0.8;
                        this.posZ[id] += Math.cos(time * 0.2 + id * 0.7) * delta * 0.8;
                        this.posY[id] = 3 + Math.sin(time * 0.3 + id * 0.5) * 2;
                        this.rotY[id] = Math.atan2(
                            Math.sin(time * 0.15 + id),
                            Math.cos(time * 0.2 + id * 0.7)
                        );
                    }
                    // Agua (ondas)
                    if (this.isWater[id]) {
                        this.posY[id] = 0.2 + Math.sin(time * 0.8 + this.posX[id] * 0.05) * 0.1 +
                                       Math.cos(time * 0.6 + this.posZ[id] * 0.06) * 0.08;
                    }
                    // Partículas
                    if (this.isParticle[id]) {
                        this.posY[id] += Math.sin(time * 0.15 + this.windOffset[id]) * delta * 0.06;
                        this.posX[id] += Math.sin(time * 0.08 + id) * delta * 0.03;
                        this.posZ[id] += Math.cos(time * 0.08 + id * 0.7) * delta * 0.03;
                    }
                }
            }
            reset() {
                this.count = 0;
                this.active.fill(0);
            }
            getStats() {
                return { total: this.count, active: this.getActive().length };
            }
        }

        // ============================================================
        //  GENERADOR DE MUNDO COMPLETO
        //  ============================================================
        class WorldGenerator {
            constructor(soa) {
                this.soa = soa;
                this.beagleTarget = { x: 0, z: 0 };
                this.dirChangeTimer = 0;
            }

            // ===== TERRAIN HEIGHT (montañas y valles) =====
            getHeight(x, z) {
                return Math.sin(x * 0.008) * Math.cos(z * 0.01) * 8 +
                       Math.sin(x * 0.003 + z * 0.005) * 4 +
                       Math.cos(x * 0.015 - z * 0.012) * 3;
            }

            generate() {
                console.log('🌍 Generando mundo completo...');
                this.soa.reset();
                let total = 0;

                updateLoader(10, '🏔️ Generando terreno...');

                // ===== PASTO (60,000) =====
                for (let i = 0; i < 60000; i++) {
                    const x = (Math.random() - 0.5) * 600;
                    const z = (Math.random() - 0.5) * 600;
                    const h = this.getHeight(x, z);
                    const y = h + 0.05 + Math.random() * 0.15;
                    const id = this.soa.createEntity(x, y, z);
                    if (id !== -1) {
                        this.soa.isGrass[id] = 1;
                        const g = 70 + Math.random() * 90 + h * 2;
                        this.soa.colR[id] = 20 + Math.random() * 20 + h * 0.5;
                        this.soa.colG[id] = Math.min(255, Math.max(0, g));
                        this.soa.colB[id] = 10 + Math.random() * 15 + h * 0.3;
                        this.soa.scale[id] = 0.15 + Math.random() * 0.35;
                        this.soa.rotY[id] = Math.random() * Math.PI * 2;
                        this.soa.windOffset[id] = Math.random() * Math.PI * 2;
                        total++;
                    }
                }

                updateLoader(25, '🌸 Plantando flores...');

                // ===== FLORES (1,000) =====
                const flowerColors = [
                    [255,100,150],[255,200,100],[200,100,255],
                    [255,150,200],[100,200,255],[255,100,100],
                    [255,255,200],[200,200,100]
                ];
                for (let i = 0; i < 1000; i++) {
                    const x = (Math.random() - 0.5) * 500;
                    const z = (Math.random() - 0.5) * 500;
                    const h = this.getHeight(x, z);
                    if (h > -2 && h < 5) {
                        const y = h + 0.15 + Math.random() * 0.15;
                        const id = this.soa.createEntity(x, y, z);
                        if (id !== -1) {
                            this.soa.isFlower[id] = 1;
                            const c = flowerColors[Math.floor(Math.random() * flowerColors.length)];
                            this.soa.colR[id] = c[0];
                            this.soa.colG[id] = c[1];
                            this.soa.colB[id] = c[2];
                            this.soa.scale[id] = 0.08 + Math.random() * 0.12;
                            this.soa.windOffset[id] = Math.random() * Math.PI * 2;
                            total++;
                        }
                    }
                }

                updateLoader(40, '🌳 Plantando árboles...');

                // ===== ÁRBOLES (350) =====
                for (let i = 0; i < 350; i++) {
                    const x = (Math.random() - 0.5) * 450;
                    const z = (Math.random() - 0.5) * 450;
                    const h = this.getHeight(x, z);
                    if (h > 1 && h < 10) {
                        const y = h + 0.3;
                        const id = this.soa.createEntity(x, y, z);
                        if (id !== -1) {
                            this.soa.isTree[id] = 1;
                            this.soa.colR[id] = 40 + Math.random() * 30;
                            this.soa.colG[id] = 80 + Math.random() * 50;
                            this.soa.colB[id] = 20 + Math.random() * 20;
                            this.soa.scale[id] = 0.8 + Math.random() * 2.5;
                            this.soa.rotY[id] = Math.random() * Math.PI * 2;
                            total++;
                        }
                    }
                }

                updateLoader(55, '💧 Creando agua...');

                // ===== AGUA (200 parches con ondas) =====
                for (let i = 0; i < 200; i++) {
                    const x = (Math.random() - 0.5) * 400;
                    const z = (Math.random() - 0.5) * 400;
                    const h = this.getHeight(x, z);
                    if (h < 0.5 && h > -1) {
                        const y = h + 0.15;
                        const id = this.soa.createEntity(x, y, z);
                        if (id !== -1) {
                            this.soa.isWater[id] = 1;
                            this.soa.colR[id] = 20;
                            this.soa.colG[id] = 80;
                            this.soa.colB[id] = 220;
                            this.soa.scale[id] = 1 + Math.random() * 3;
                            total++;
                        }
                    }
                }

                updateLoader(70, '🐝 Creando abejas...');

                // ===== ABEJAS (50) =====
                for (let i = 0; i < 50; i++) {
                    const x = (Math.random() - 0.5) * 350;
                    const z = (Math.random() - 0.5) * 350;
                    const y = 0.8 + Math.random() * 1.5;
                    const id = this.soa.createEntity(x, y, z);
                    if (id !== -1) {
                        this.soa.isBee[id] = 1;
                        this.soa.colR[id] = 255;
                        this.soa.colG[id] = 200;
                        this.soa.colB[id] = 50;
                        this.soa.scale[id] = 0.06 + Math.random() * 0.04;
                        total++;
                    }
                }

                updateLoader(80, '🐦 Creando aves...');

                // ===== AVES (30) =====
                for (let i = 0; i < 30; i++) {
                    const x = (Math.random() - 0.5) * 400;
                    const z = (Math.random() - 0.5) * 400;
                    const y = 3 + Math.random() * 8;
                    const id = this.soa.createEntity(x, y, z);
                    if (id !== -1) {
                        this.soa.isBird[id] = 1;
                        const bc = [[40,40,40],[60,60,60],[100,100,100],[180,180,180]];
                        const c = bc[Math.floor(Math.random() * bc.length)];
                        this.soa.colR[id] = c[0];
                        this.soa.colG[id] = c[1];
                        this.soa.colB[id] = c[2];
                        this.soa.scale[id] = 0.15 + Math.random() * 0.1;
                        total++;
                    }
                }

                updateLoader(90, '🐾 Creando Beagle...');

                // ===== BEAGLE =====
                const beagleId = this.soa.createEntity(0, 0.4, 0);
                if (beagleId !== -1) {
                    this.soa.isBeagle[beagleId] = 1;
                    this.soa.colR[beagleId] = 180;
                    this.soa.colG[beagleId] = 150;
                    this.soa.colB[beagleId] = 100;
                    this.soa.scale[beagleId] = 0.7;
                    window._beagleId = beagleId;
                    total++;
                }

                updateLoader(95, '✨ Creando partículas...');

                // ===== PARTÍCULAS (1,000) =====
                for (let i = 0; i < 1000; i++) {
                    const x = (Math.random() - 0.5) * 500;
                    const z = (Math.random() - 0.5) * 500;
                    const y = 0.5 + Math.random() * 4;
                    const id = this.soa.createEntity(x, y, z);
                    if (id !== -1) {
                        this.soa.isParticle[id] = 1;
                        this.soa.colR[id] = 255;
                        this.soa.colG[id] = 230;
                        this.soa.colB[id] = 180;
                        this.soa.scale[id] = 0.015 + Math.random() * 0.025;
                        this.soa.windOffset[id] = Math.random() * Math.PI * 2;
                        total++;
                    }
                }

                updateLoader(100, '✅ ¡Mundo completo!');

                console.log(`✅ Mundo generado: ${this.soa.count} entidades`);
                console.log(`   🌿 Pasto: 60,000`);
                console.log(`   🌸 Flores: 1,000`);
                console.log(`   🌳 Árboles: 350`);
                console.log(`   💧 Agua: 200`);
                console.log(`   🐝 Abejas: 50`);
                console.log(`   🐦 Aves: 30`);
                console.log(`   🐾 Beagle: 1`);
                console.log(`   ✨ Partículas: 1,000`);

                document.getElementById('entities').textContent = this.soa.count;
                document.getElementById('grass').textContent = '60,000';
                document.getElementById('flowers').textContent = '1,000';

                return this.soa.count;
            }

            // ===== BEAGLE CON IA =====
            updateBeagle(delta, time) {
                const id = window._beagleId;
                if (id === undefined || id === -1) return;
                if (!this.soa.active[id]) return;

                const speed = 0.7;
                this.dirChangeTimer += delta;

                if (this.dirChangeTimer > 2 + Math.random() * 3) {
                    this.dirChangeTimer = 0;
                    const angle = (Math.random() - 0.5) * 2.8;
                    const currentAngle = Math.atan2(this.soa.velX[id], this.soa.velZ[id]) || 0;
                    const newAngle = currentAngle + angle;
                    this.soa.velX[id] = Math.sin(newAngle) * speed;
                    this.soa.velZ[id] = Math.cos(newAngle) * speed;

                    if (Math.random() < 0.12) {
                        this.soa.velX[id] *= 0.1;
                        this.soa.velZ[id] *= 0.1;
                        setTimeout(() => {
                            if (this.soa.active[id]) {
                                const a2 = Math.random() * Math.PI * 2;
                                this.soa.velX[id] = Math.sin(a2) * speed * 0.8;
                                this.soa.velZ[id] = Math.cos(a2) * speed * 0.8;
                            }
                        }, 2000 + Math.random() * 3000);
                    }
                }

                // Movimiento suave
                const currentSpeed = Math.sqrt(this.soa.velX[id]*this.soa.velX[id] + this.soa.velZ[id]*this.soa.velZ[id]);
                if (currentSpeed < speed * 0.3) {
                    this.soa.velX[id] *= 1.02;
                    this.soa.velZ[id] *= 1.02;
                } else if (currentSpeed > speed * 1.2) {
                    this.soa.velX[id] *= 0.98;
                    this.soa.velZ[id] *= 0.98;
                }

                this.soa.posX[id] += this.soa.velX[id] * delta * 2;
                this.soa.posZ[id] += this.soa.velZ[id] * delta * 2;

                // Rotación suave
                if (Math.abs(this.soa.velX[id]) > 0.01 || Math.abs(this.soa.velZ[id]) > 0.01) {
                    const targetRot = Math.atan2(this.soa.velX[id], this.soa.velZ[id]);
                    let diff = targetRot - (this.soa.rotY[id] || 0);
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    this.soa.rotY[id] += diff * delta * 3;
                }

                this.soa.rotX[id] = Math.sin(time * 1.2) * 0.03;

                // Salto ocasional
                if (Math.random() < 0.0008) {
                    this.soa.posY[id] = 0.6;
                    setTimeout(() => {
                        if (this.soa.active[id]) this.soa.posY[id] = 0.4;
                    }, 200);
                }

                // Límites
                const bound = 280;
                if (Math.abs(this.soa.posX[id]) > bound) this.soa.velX[id] *= -0.5;
                if (Math.abs(this.soa.posZ[id]) > bound) this.soa.velZ[id] *= -0.5;

                // Evitar árboles
                const active = this.soa.getActive();
                for (const aid of active) {
                    if (this.soa.isTree[aid]) {
                        const dx = this.soa.posX[id] - this.soa.posX[aid];
                        const dz = this.soa.posZ[id] - this.soa.posZ[aid];
                        const dist = Math.sqrt(dx*dx + dz*dz);
                        if (dist < 3 && dist > 0.1) {
                            this.soa.velX[id] += dx / dist * delta * 0.6;
                            this.soa.velZ[id] += dz / dist * delta * 0.6;
                        }
                    }
                }

                // Cálculo de LOD (para todos los objetos cerca del Beagle)
                const bX = this.soa.posX[id];
                const bZ = this.soa.posZ[id];
                for (const eid of active) {
                    const dx = this.soa.posX[eid] - bX;
                    const dz = this.soa.posZ[eid] - bZ;
                    const dist = Math.sqrt(dx*dx + dz*dz);
                    if (dist < 30) this.soa.lodLevel[eid] = 0;
                    else if (dist < 60) this.soa.lodLevel[eid] = 1;
                    else if (dist < 120) this.soa.lodLevel[eid] = 2;
                    else this.soa.lodLevel[eid] = 3;
                }
            }
        }

        // ============================================================
        //  IA DUAL
        //  ============================================================
        class OptimizerAI {
            constructor() {
                this.quality = 'ultra';
                this.confidence = 0.9;
                this.fpsHistory = [];
                this.currentFPS = 60;
                this.levels = ['low', 'medium', 'high', 'ultra', 'quantum'];
                this.currentLevel = 3;
                this.cooldown = 0;
                this.stableFrames = 0;
            }
            update(fps, lodDist) {
                this.fpsHistory.push(fps);
                if (this.fpsHistory.length > 60) this.fpsHistory.shift();
                this.currentFPS = fps;
                
                const ratio = fps / 60;
                if (this.cooldown > 0) this.cooldown--;
                
                if (this.cooldown === 0) {
                    if (ratio < 0.5 && this.currentLevel > 0) {
                        this.currentLevel--;
                        this.cooldown = 60;
                        this.confidence = Math.max(0.3, this.confidence - 0.1);
                        this.stableFrames = 0;
                    } else if (ratio > 0.9 && this.currentLevel < 4) {
                        if (this.stableFrames > 30) {
                            this.currentLevel++;
                            this.cooldown = 120;
                            this.confidence = Math.min(1, this.confidence + 0.05);
                            this.stableFrames = 0;
                        }
                    } else if (ratio > 0.7 && ratio < 0.9) {
                        this.stableFrames++;
                    }
                }
                
                this.quality = this.levels[this.currentLevel];
                const lods = [60, 100, 150, 200, 260];
                const newLod = lods[this.currentLevel];
                
                return { quality: this.quality, lodDistance: newLod, confidence: this.confidence };
            }
            getStatus() {
                return { quality: this.quality, confidence: this.confidence, level: this.currentLevel };
            }
        }

        class MetaOptimizerAI {
            constructor() {
                this.confidence = 0.8;
                this.prediction = 'estable';
                this.history = [];
            }
            update(fps) {
                this.history.push(fps);
                if (this.history.length > 30) this.history.shift();
                if (this.history.length > 10) {
                    const recent = this.history.slice(-10);
                    const avg = recent.reduce((a,b) => a+b, 0) / recent.length;
                    const last = recent[recent.length-1];
                    this.prediction = last < avg * 0.85 ? 'caída_inminente' : 
                                     last > avg * 1.15 ? 'mejora_inminente' : 'estable';
                    this.confidence = Math.min(1, this.confidence + 0.001);
                }
                return { prediction: this.prediction, confidence: this.confidence };
            }
            getStatus() {
                return { prediction: this.prediction, confidence: this.confidence };
            }
        }

        // ============================================================
        //  RENDERER COMPLETO
        //  ============================================================
        const canvas = document.getElementById('gameCanvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.outputEncoding = THREE.sRGBEncoding;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 150, 500);

        // ===== CÁMARA =====
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 800);
        camera.position.set(20, 15, 25);

        // ===== LUCES Y DÍA/NOCHE =====
        const ambient = new THREE.AmbientLight(0x88bbff, 0.5);
        scene.add(ambient);
        const hemi = new THREE.HemisphereLight(0x88ccff, 0x44aa44, 0.6);
        scene.add(hemi);
        const sun = new THREE.DirectionalLight(0xffdd88, 2.0);
        sun.position.set(80, 100, 60);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 2048;
        sun.shadow.mapSize.height = 2048;
        sun.shadow.camera.near = 0.5;
        sun.shadow.camera.far = 300;
        sun.shadow.camera.left = -120;
        sun.shadow.camera.right = 120;
        sun.shadow.camera.top = 120;
        sun.shadow.camera.bottom = -120;
        scene.add(sun);
        const fill = new THREE.DirectionalLight(0x88ccff, 0.4);
        fill.position.set(-60, 30, -40);
        scene.add(fill);

        // ===== BLOOM (post-procesado) =====
        let bloomPass = null;
        let composer = null;
        try {
            if (THREE.EffectComposer && THREE.RenderPass && THREE.UnrealBloomPass) {
                composer = new THREE.EffectComposer(renderer);
                const renderPass = new THREE.RenderPass(scene, camera);
                composer.addPass(renderPass);
                bloomPass = new THREE.UnrealBloomPass(
                    new THREE.Vector2(window.innerWidth, window.innerHeight),
                    0.4, 0.5, 0.85
                );
                composer.addPass(bloomPass);
                console.log('✨ Bloom activado');
            } else {
                console.log('⚠️ Bloom no disponible, continuando sin él');
            }
        } catch(e) {
            console.log('⚠️ Bloom no disponible:', e);
        }

        // ============================================================
        //  GEOMETRÍAS
        //  ============================================================
        const grassGeo = new THREE.CylinderGeometry(0.01, 0.025, 0.3, 4);
        const flowerGeo = new THREE.SphereGeometry(0.04, 6, 6);
        const treeTrunk = new THREE.CylinderGeometry(0.06, 0.1, 0.5, 4);
        const treeCrown = new THREE.SphereGeometry(0.4, 5, 5);
        const beeGeo = new THREE.SphereGeometry(0.04, 4, 4);
        const birdGeo = new THREE.SphereGeometry(0.06, 4, 4);
        const waterGeo = new THREE.PlaneGeometry(4, 4, 4, 4);

        const grassMat = new THREE.MeshStandardMaterial({ roughness: 0.9, metalness: 0 });
        const flowerMat = new THREE.MeshStandardMaterial({ roughness: 0.4, metalness: 0 });
        const treeTrunkMat = new THREE.MeshStandardMaterial({ color: 0x6B4F3C, roughness: 0.9 });
        const treeCrownMat = new THREE.MeshStandardMaterial({ roughness: 0.8, metalness: 0 });
        const beeMat = new THREE.MeshStandardMaterial({ roughness: 0.3, metalness: 0.1 });
        const birdMat = new THREE.MeshStandardMaterial({ roughness: 0.5, metalness: 0 });
        const waterMat = new THREE.MeshPhysicalMaterial({
            color: 0x0066aa,
            transparent: true,
            opacity: 0.5,
            roughness: 0.1,
            metalness: 0,
            clearcoat: 0.3
        });
        const particleMat = new THREE.PointsMaterial({
            size: 0.035,
            vertexColors: true,
            transparent: true,
            opacity: 0.3,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        // ===== BEAGLE =====
        let beagleGroup = null;

        function createBeagle() {
            const group = new THREE.Group();
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xD4A574, roughness: 0.6 });
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), bodyMat);
            body.scale.set(1, 0.7, 1.2);
            body.position.y = 0.2;
            group.add(body);
            
            const headMat = new THREE.MeshStandardMaterial({ color: 0xE8C99E, roughness: 0.6 });
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), headMat);
            head.position.set(0.35, 0.35, 0);
            group.add(head);
            
            const snoutMat = new THREE.MeshStandardMaterial({ color: 0xD4A574, roughness: 0.7 });
            const snout = new THREE.Mesh(new THREE.SphereGeometry(0.08, 6, 6), snoutMat);
            snout.position.set(0.48, 0.32, 0);
            snout.scale.set(1, 0.7, 0.8);
            group.add(snout);
            
            const noseMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.3 });
            const nose = new THREE.Mesh(new THREE.SphereGeometry(0.03, 6, 6), noseMat);
            nose.position.set(0.52, 0.32, 0);
            group.add(nose);
            
            const earMat = new THREE.MeshStandardMaterial({ color: 0x8B6B4D, roughness: 0.8 });
            for (const side of [-0.12, 0.12]) {
                const ear = new THREE.Mesh(new THREE.SphereGeometry(0.06, 6, 6), earMat);
                ear.position.set(0.3, 0.3, side);
                ear.scale.set(0.8, 1.5, 0.5);
                group.add(ear);
            }
            
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0x2a1a0a, roughness: 0.1 });
            for (const side of [-0.06, 0.06]) {
                const eye = new THREE.Mesh(new THREE.SphereGeometry(0.025, 6, 6), eyeMat);
                eye.position.set(0.42, 0.38, side);
                group.add(eye);
            }
            
            const tailMat = new THREE.MeshStandardMaterial({ color: 0xF5E6D0, roughness: 0.8 });
            const tail = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.03, 0.15, 4), tailMat);
            tail.position.set(-0.35, 0.1, 0);
            tail.rotation.z = 0.4;
            group.add(tail);
            group._tail = tail;
            
            const legMat = new THREE.MeshStandardMaterial({ color: 0xE8D5B8, roughness: 0.7 });
            const legPositions = [[-0.15,-0.05,0.12],[-0.15,-0.05,-0.12],[0.15,-0.05,0.12],[0.15,-0.05,-0.12]];
            for (const p of legPositions) {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.03, 0.12, 4), legMat);
                leg.position.set(p[0], p[1], p[2]);
                group.add(leg);
            }
            
            const spotMat = new THREE.MeshStandardMaterial({ color: 0x8B6B4D, roughness: 0.7 });
            const spot = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6, 6), spotMat);
            spot.position.set(0, 0.25, 0.15);
            spot.scale.set(0.8, 0.3, 0.5);
            group.add(spot);
            
            group.scale.set(0.8, 0.8, 0.8);
            return group;
        }

        // ============================================================
        //  RENDERIZADO
        //  ============================================================
        const grassMeshes = [], flowerMeshes = [], treeMeshes = [];
        const beeMeshes = [], birdMeshes = [], waterMeshes = [];
        let particleSystem = null;

        function renderScene(soa, lodDist) {
            const active = soa.getActive();
            const camPos = camera.position;
            
            for (const m of grassMeshes) scene.remove(m);
            for (const m of flowerMeshes) scene.remove(m);
            for (const m of treeMeshes) scene.remove(m);
            for (const m of beeMeshes) scene.remove(m);
            for (const m of birdMeshes) scene.remove(m);
            for (const m of waterMeshes) scene.remove(m);
            grassMeshes.length = 0;
            flowerMeshes.length = 0;
            treeMeshes.length = 0;
            beeMeshes.length = 0;
            birdMeshes.length = 0;
            waterMeshes.length = 0;
            if (particleSystem) { scene.remove(particleSystem); particleSystem = null; }
            if (beagleGroup) { scene.remove(beagleGroup); beagleGroup = null; }

            const grassData = [], flowerData = [], treeData = [];
            const beeData = [], birdData = [], waterData = [];
            const beagleData = [];
            const particlePos = [], particleCol = [];

            for (const id of active) {
                const dx = soa.posX[id] - camPos.x;
                const dz = soa.posZ[id] - camPos.z;
                const dist = Math.sqrt(dx*dx + dz*dz);
                
                // FRUSTUM CULLING + LOD
                if (dist > lodDist * 1.5) continue;
                
                const lod = soa.lodLevel[id] || 0;
                
                if (soa.isGrass[id] && lod < 2) {
                    grassData.push({ 
                        pos: [soa.posX[id], soa.posY[id], soa.posZ[id]], 
                        scale: soa.scale[id] * (lod === 1 ? 0.6 : 1),
                        rotY: soa.rotY[id] || 0,
                        rotX: soa.rotX[id] || 0,
                        rotZ: soa.rotZ[id] || 0
                    });
                } else if (soa.isFlower[id] && lod < 2) {
                    flowerData.push({ 
                        pos: [soa.posX[id], soa.posY[id], soa.posZ[id]],
                        color: [soa.colR[id], soa.colG[id], soa.colB[id]],
                        scale: soa.scale[id] * (lod === 1 ? 0.7 : 1),
                        rotX: soa.rotX[id] || 0,
                        rotZ: soa.rotZ[id] || 0
                    });
                } else if (soa.isTree[id] && lod < 3) {
                    const s = soa.scale[id] * (lod === 1 ? 0.7 : lod === 2 ? 0.4 : 1);
                    treeData.push({ 
                        pos: [soa.posX[id], soa.posY[id], soa.posZ[id]],
                        scale: s,
                        rot: soa.rotY[id] || 0,
                        lod: lod
                    });
                } else if (soa.isWater[id] && lod < 2) {
                    waterData.push({ 
                        pos: [soa.posX[id], soa.posY[id], soa.posZ[id]],
                        scale: soa.scale[id]
                    });
                } else if (soa.isBee[id] && lod < 1) {
                    beeData.push({ 
                        pos: [soa.posX[id], soa.posY[id], soa.posZ[id]],
                        scale: soa.scale[id],
                        rot: soa.rotY[id] || 0
                    });
                } else if (soa.isBird[id] && lod < 1) {
                    birdData.push({ 
                        pos: [soa.posX[id], soa.posY[id], soa.posZ[id]],
                        scale: soa.scale[id],
                        rot: soa.rotY[id] || 0
                    });
                } else if (soa.isBeagle[id]) {
                    beagleData.push({ 
                        pos: [soa.posX[id], soa.posY[id], soa.posZ[id]],
                        rotY: soa.rotY[id] || 0,
                        rotX: soa.rotX[id] || 0
                    });
                } else if (soa.isParticle[id] && lod < 1) {
                    particlePos.push(soa.posX[id], soa.posY[id], soa.posZ[id]);
                    particleCol.push(soa.colR[id]/255, soa.colG[id]/255, soa.colB[id]/255);
                }
            }

            // Renderizar con LOD
            if (grassData.length > 0) {
                const mesh = new THREE.InstancedMesh(grassGeo, grassMat, grassData.length);
                const dummy = new THREE.Object3D();
                for (let i = 0; i < grassData.length; i++) {
                    const d = grassData[i];
                    dummy.position.set(d.pos[0], d.pos[1], d.pos[2]);
                    dummy.rotation.set(d.rotX || 0, d.rotY || 0, d.rotZ || 0);
                    dummy.scale.set(0.5 + d.scale * 0.5, 1 + d.scale * 2, 0.5 + d.scale * 0.5);
                    dummy.updateMatrix();
                    mesh.setMatrixAt(i, dummy.matrix);
                }
                mesh.count = grassData.length;
                mesh.instanceMatrix.needsUpdate = true;
                scene.add(mesh);
                grassMeshes.push(mesh);
            }

            if (flowerData.length > 0) {
                const mesh = new THREE.InstancedMesh(flowerGeo, flowerMat, flowerData.length);
                const dummy = new THREE.Object3D();
                for (let i = 0; i < flowerData.length; i++) {
                    const d = flowerData[i];
                    dummy.position.set(d.pos[0], d.pos[1], d.pos[2]);
                    dummy.rotation.set(d.rotX || 0, 0, d.rotZ || 0);
                    dummy.scale.set(d.scale * 2, d.scale * 2, d.scale * 2);
                    dummy.updateMatrix();
                    mesh.setMatrixAt(i, dummy.matrix);
                    const c = new THREE.Color();
                    c.setRGB(d.color[0]/255, d.color[1]/255, d.color[2]/255);
                    mesh.setColorAt(i, c);
                }
                mesh.count = flowerData.length;
                mesh.instanceMatrix.needsUpdate = true;
                if (mesh.instanceColor) mesh.instanceColor.needsUpdate = true;
                scene.add(mesh);
                flowerMeshes.push(mesh);
            }

            for (const d of treeData) {
                const group = new THREE.Group();
                const trunk = new THREE.Mesh(treeTrunk, treeTrunkMat);
                trunk.position.y = 0.25;
                group.add(trunk);
                const crown = new THREE.Mesh(treeCrown, treeCrownMat);
                crown.position.y = 0.7;
                const cS = (d.lod === 2 ? 0.5 : 1);
                crown.scale.set(cS, cS * 0.7, cS);
                group.add(crown);
                group.position.set(d.pos[0], d.pos[1], d.pos[2]);
                const s = d.scale * 0.5;
                group.scale.set(s, s, s);
                group.rotation.y = d.rot || 0;
                scene.add(group);
                treeMeshes.push(group);
            }

            for (const d of waterData) {
                const mesh = new THREE.Mesh(waterGeo, waterMat);
                mesh.position.set(d.pos[0], d.pos[1] - 0.1, d.pos[2]);
                const s = d.scale * 0.8;
                mesh.scale.set(s, s, s);
                mesh.rotation.x = -Math.PI / 2;
                scene.add(mesh);
                waterMeshes.push(mesh);
            }

            for (const d of beeData) {
                const mesh = new THREE.Mesh(beeGeo, beeMat);
                mesh.position.set(d.pos[0], d.pos[1], d.pos[2]);
                mesh.scale.set(d.scale * 3, d.scale * 3, d.scale * 3);
                mesh.rotation.y = d.rot || 0;
                scene.add(mesh);
                beeMeshes.push(mesh);
            }

            for (const d of birdData) {
                const mesh = new THREE.Mesh(birdGeo, birdMat);
                mesh.position.set(d.pos[0], d.pos[1], d.pos[2]);
                const s = d.scale * 2;
                mesh.scale.set(s, s, s);
                mesh.rotation.y = d.rot || 0;
                scene.add(mesh);
                birdMeshes.push(mesh);
            }

            if (beagleData.length > 0) {
                if (!beagleGroup) beagleGroup = createBeagle();
                const d = beagleData[0];
                beagleGroup.position.set(d.pos[0], d.pos[1], d.pos[2]);
                beagleGroup.rotation.y = d.rotY || 0;
                beagleGroup.rotation.x = d.rotX || 0;
                if (beagleGroup._tail) {
                    beagleGroup._tail.rotation.x = Math.sin(Date.now() * 0.003) * 0.3 + 0.3;
                }
                scene.add(beagleGroup);
            }

            if (particlePos.length > 0) {
                const geo = new THREE.BufferGeometry();
                geo.setAttribute('position', new THREE.Float32BufferAttribute(particlePos, 3));
                geo.setAttribute('color', new THREE.Float32BufferAttribute(particleCol, 3));
                const points = new THREE.Points(geo, particleMat);
                scene.add(points);
                particleSystem = points;
            }

            // Cámara sigue al Beagle
            if (beagleData.length > 0) {
                const bId = window._beagleId;
                if (bId !== undefined && soa.active[bId]) {
                    const tX = soa.posX[bId], tZ = soa.posZ[bId];
                    const angle = soa.rotY[bId] || 0;
                    const dX = 22, dH = 16;
                    const cX = tX - Math.sin(angle) * dX;
                    const cZ = tZ - Math.cos(angle) * dX;
                    const cY = dH + 2;
                    camera.position.x += (cX - camera.position.x) * 0.02;
                    camera.position.z += (cZ - camera.position.z) * 0.02;
                    camera.position.y += (cY - camera.position.y) * 0.02;
                    camera.lookAt(tX, 0.5, tZ);
                }
            }

            // Render con bloom o sin él
            if (composer && bloomPass && CONFIG.quality !== 'low') {
                if (bloomPass) bloomPass.strength = CONFIG.quality === 'ultra' ? 0.5 : 0.2;
                composer.render();
            } else {
                renderer.render(scene, camera);
            }
        }

        // ============================================================
        //  INICIO
        //  ============================================================
        const soa = new SoaManager(CONFIG.maxEntities);
        const generator = new WorldGenerator(soa);
        const optimizerAI = new OptimizerAI();
        const metaAI = new MetaOptimizerAI();

        let frameCount = 0, lastFpsUpdate = 0, worldGenerated = false;

        function gameLoop(time) {
            if (!worldGenerated) {
                generator.generate();
                worldGenerated = true;
                setTimeout(() => document.getElementById('loading').classList.add('hidden'), 500);
                document.getElementById('loader-text').textContent = '✅ ¡100% POTENCIA ACTIVADA!';
            }

            const delta = 0.016;
            const timeSec = Date.now() * 0.001;
            const wind = Math.sin(timeSec * 0.3) * 0.5;

            soa.updatePhysics(delta, timeSec, wind);
            generator.updateBeagle(delta, timeSec);

            // IA Dual
            const fps = frameCount > 0 ? 1000 / (time - lastFpsUpdate) : 60;
            const aiResult = optimizerAI.update(fps, CONFIG.lodDistance);
            const metaResult = metaAI.update(fps);

            // Actualizar configuración en tiempo real
            CONFIG.quality = aiResult.quality;
            CONFIG.lodDistance = aiResult.lodDistance;

            renderScene(soa, CONFIG.lodDistance);

            frameCount++;
            if (time - lastFpsUpdate > 1000) {
                const cfps = Math.round(frameCount / ((time - lastFpsUpdate) / 1000));
                document.getElementById('fps').textContent = cfps;
                document.getElementById('fps').className = 'v ' + (cfps > 50 ? 'good' : cfps > 30 ? 'warn' : '');
                document.getElementById('quality').textContent = aiResult.quality.toUpperCase();
                document.getElementById('lod').textContent = CONFIG.lodDistance + 'm';
                document.getElementById('ai-conf').textContent = Math.round(aiResult.confidence * 100) + '%';
                document.getElementById('ai-meta').textContent = Math.round(metaResult.confidence * 100) + '%';
                document.getElementById('ai-fill').style.width = Math.round(aiResult.confidence * 100) + '%';
                document.getElementById('ai-action').textContent = '🎯 ' + aiResult.quality.toUpperCase();
                document.getElementById('ai-detail').textContent = '· ' + cfps + ' FPS';
                frameCount = 0;
                lastFpsUpdate = time;
            }

            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            if (composer) composer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log('🚀 Iniciando PRIOM V0.1 - 100% POTENCIA');
        requestAnimationFrame(gameLoop);

    })();
    </script>
</body>
